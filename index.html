<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Оболонь — официальный сайт</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: white;
      text-align: center;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: url('https://images.unsplash.com/photo-1511379938547-c1f69419868d') center/cover;
    }

    .overlay {
      background: rgba(0,0,0,0.6);
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    h1 {
      font-size: 60px;
      z-index: 1;
    }

    p {
      font-size: 20px;
      z-index: 1;
      max-width: 600px;
    }

    .content {
      padding: 60px 20px;
    }
  </style>
</head>

<body>

  <div class="hero">
    <div class="overlay"></div>
    <h1>ОБОЛОНЬ</h1>
    <p>Официальный сайт исполнителя</p>
  </div>

  <div class="content">
    <h2>Обо мне</h2>
    <p>
      Оболонь — музыкальный исполнитель. Здесь публикуются официальные материалы, фото и релизы.
    </p>
  </div>

</body>
<div class="content">
  <h2>Фото</h2>

  <div class="gallery">
    <img src="IMG_123.jpg" />
    <img src="IMG_456.jpg" />
    <img src="IMG_789.jpg" />
  </div>
</div>

<style>
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  margin-top: 20px;
  padding: 0 20px;
}

.gallery img {
  width: 100%;
  border-radius: 12px;
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.05);
}
</style>
</html>
