<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Оболонь — официальный сайт</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0b0b0f;
      color: white;
    }

    /* HERO */
    .hero {
      height: 100vh;
      background: url('https://images.unsplash.com/photo-1511379938547-c1f69419868d') center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      text-align: center;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.65);
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: 72px;
      letter-spacing: 4px;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 18px;
      opacity: 0.8;
    }

    /* SECTIONS */
    .section {
      padding: 80px 20px;
      max-width: 1000px;
      margin: 0 auto;
      text-align: center;
    }

    h2 {
      font-size: 36px;
      margin-bottom: 20px;
    }

    p {
      opacity: 0.85;
      line-height: 1.6;
    }

    /* GALLERY */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      margin-top: 30px;
    }

    .gallery img {
      width: 100%;
      border-radius: 14px;
      transition: 0.3s;
      cursor: pointer;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    /* FOOTER */
    footer {
      padding: 40px;
      text-align: center;
      opacity: 0.6;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="hero">
    <div class="hero-content">
      <h1>ОБОЛОНЬ</h1>
      <div class="subtitle">Официальный сайт исполнителя</div>
    </div>
  </div>

  <div class="section">
    <h2>Обо мне</h2>
    <p>
      Оболонь — музыкальный исполнитель. Здесь собраны официальные материалы, фотографии и релизы.
    </p>
  </div>

  <div class="section">
    <h2>Фото</h2>

    <div class="gallery">
      <img src="IMG_123.jpg" />
      <img src="IMG_456.jpg" />
      <img src="IMG_789.jpg" />
    </div>
  </div>

  <footer>
    © 2026 Оболонь. Все права защищены.
  </footer>

</body>
</html>
