<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Оболонь — официальный сайт</title>

  <link rel="icon" href="logo.png" type="image/png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0b0b0f;
      color: white;
      scroll-behavior: smooth;
    }

    #splash {
      position: fixed;
      inset: 0;
      background: #0b0b0f;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #splash img {
      width: 140px;
      animation: zoomIn 1s ease;
    }

    @keyframes zoomIn {
      from {
        transform: scale(0.5);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .hero {
      height: 100vh;
      background: url('https://images.unsplash.com/photo-1511379938547-c1f69419868d') center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      text-align: center;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.65);
    }

    .hero-content {
      position: relative;
      z-index: 1;
      animation: fadeIn 1.5s ease;
    }

    h1 {
      font-size: 72px;
      letter-spacing: 4px;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 18px;
      opacity: 0.8;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      border: 1px solid white;
      border-radius: 8px;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      color: black;
    }

    .section {
      padding: 80px 20px;
      max-width: 1000px;
      margin: 0 auto;
      text-align: center;
    }

    h2 {
      font-size: 36px;
      margin-bottom: 20px;
    }

    p {
      opacity: 0.85;
      line-height: 1.6;
    }

    .socials {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-top: 30px;
    }

    .social-card {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      border-radius: 14px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      background: #15151c;
      border: 1px solid rgba(255,255,255,0.08);
      transition: 0.3s;
    }

    .social-card:hover {
      transform: translateY(-5px);
      border-color: rgba(255,255,255,0.25);
    }

    .tg:hover { background: #229ED9; }
    .vk:hover { background: #4C75A3; }
    .yt:hover { background: #FF0033; }
    .ym:hover { background: #ffcc00; color: black; }
    .am:hover { background: #a855f7; }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      margin-top: 30px;
    }

    .gallery img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 14px;
      transition: 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    footer {
      padding: 40px;
      text-align: center;
      opacity: 0.6;
      font-size: 14px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      h1 { font-size: 40px; }
      h2 { font-size: 28px; }
    }
  </style>
</head>

<body>

  <div id="splash">
    <img src="logo.png" alt="logo">
  </div>

  <div class="hero">
    <div class="hero-content">
      <h1>ОБОЛОНЬ</h1>
      <div class="subtitle">Официальный сайт исполнителя</div>
      <a href="#about" class="btn">Узнать больше</a>
    </div>
  </div>

  <div class="section" id="about">
    <h2>Обо мне</h2>
    <p>
      Оболонь — музыкальный исполнитель.
Здесь собраны официальные материалы, фотографии и релизы.
    </p>
  </div>

  <div class="section">
    <h2>Социальные сети</h2>

    <div class="socials">
      <a class="social-card tg" href="https://t.me/Obolon55" target="_blank">Telegram</a>
      <a class="social-card vk" href="https://vk.ru/club230814067" target="_blank">ВКонтакте</a>
      <a class="social-card yt" href="https://youtube.com/channel/UCRbCN9zMHlqkd4gI06nthVQ?si=rl1qzp8mZxRMXwRf" target="_blank">YouTube</a>
      <a class="social-card ym" href="https://music.yandex.ru/artist/24261914?utm_source=web&utm_medium=copy_link" target="_blank">Яндекс Музыка</a>
      <a class="social-card am" href="https://music.apple.com/us/artist/%D0%BE%D0%B1%D0%BE%D0%BB%D0%BE%D0%BD%D1%8C/1816543969" target="_blank">Apple Music</a>
    </div>
  </div>

  <div class="section">
    <h2>Фото</h2>

    <div class="gallery">
      <img src="IMG_123.jpg" />
      <img src="IMG_456.jpg" />
      <img src="IMG_789.jpg" />
    </div>
  </div>

  <footer>
    © 2026 Оболонь. Все права защищены.
  </footer>

  <script>
    window.onload = function () {
      setTimeout(() => {
        document.getElementById("splash").style.display = "none";
      }, 1500);
    };
  </script>

</body>
</html>
